<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Position U</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #c8a84b;
    --accent-dim: #8a7030;
    --offense: #4a90d9;
    --defense: #d94a4a;
    --green: #4CAF50;
    --pill-h: 36px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .round-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .phase-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .phase-offense { background: rgba(74,144,217,0.15); color: var(--offense); }
  .phase-defense { background: rgba(217,74,74,0.15); color: var(--defense); }

  /* ── SPIN SCREEN ── */
  .spin-screen {
    padding: 28px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .spin-target {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
  }
  .spin-target strong {
    color: var(--accent);
    font-size: 15px;
  }

  .cards-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .spin-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 12px;
    text-align: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .spin-card.team-card { border-color: var(--accent); }
  .spin-card.era-card  { border-color: #7b5ea7; }
  .spin-card.locked {
    border-color: var(--border);
    opacity: 0.6;
  }
  .spin-card.spinning {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 2px rgba(200,168,75,0.35);
  }
  .spin-card.spinning .card-value {
    animation: slotRoll 0.1s linear infinite;
    color: var(--accent);
  }
  .spin-card.spinning .card-label {
    color: var(--accent) !important;
  }
  @keyframes slotRoll {
    0%   { opacity: 1;    transform: translateY(0); }
    30%  { opacity: 0.2;  transform: translateY(-6px); }
    50%  { opacity: 0;    transform: translateY(0); }
    70%  { opacity: 0.2;  transform: translateY(6px); }
    100% { opacity: 1;    transform: translateY(0); }
  }

  .card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .team-card .card-label { color: var(--accent); }
  .era-card  .card-label { color: #9b6fd4; }
  .locked .card-label    { color: var(--text-dim); }

  .card-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .locked-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .spin-btn {
    background: var(--accent);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 12px;
    padding: 16px;
    width: 100%;
    cursor: pointer;
    transition: all 0.15s;
  }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled {
    background: var(--surface2);
    color: var(--text-dim);
    cursor: default;
  }

  /* respin buttons now live in room header *
  .respin-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .respin-btn.available { color: var(--text); border-color: #444; }
  .respin-btn.available:hover { background: #2e2e2e; }
  .respin-btn.used { opacity: 0.4; cursor: default; }
  .respin-icon { font-size: 14px; }

  .spin-status {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    min-height: 20px;
  }

  /* ── POSITION DOCK ── */
  .dock {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 10px 12px 20px;
  }

  .dock-sections {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .dock-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
    flex-shrink: 0;
  }
  .dock-group {
    display: flex;
    gap: 6px;
  }

  .dock-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .dock-circle {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    transition: all 0.3s;
    position: relative;
  }
  .dock-circle.filled {
    border: 2px solid transparent;
    background: var(--accent);
    color: #000;
    font-size: 10px;
  }
  .dock-circle.offense-filled {
    background: var(--offense);
  }
  .dock-circle.defense-filled {
    background: var(--defense);
  }
  .dock-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .dock-label.filled-label { color: var(--text-muted); }

  /* ── ROOM SCREEN ── */
  .room-screen {
    padding: 12px 12px 200px;
  }
  .result-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: nowrap;
  }
  .result-pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.5px;
    padding: 6px 14px;
    border-radius: 8px;
  }
  .result-pill.school { background: #1a2e1a; color: #6abf6a; }
  .result-pill.era    { background: #2a1e35; color: #9b6fd4; }

  .pos-instruction {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ── POSITION CARDS — single scroll ── */
  .pos-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .pos-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .pos-card.filled-card {
    opacity: 0.38;
    cursor: default;
  }
  .pos-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
  }
  .pos-card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .pos-card.selected .pos-card-title { color: var(--accent); }
  .pos-card-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .pos-card.selected .pos-card-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* Stat column headers */
  .stat-header-row {
    display: flex;
    align-items: center;
    padding: 5px 12px 4px;
    gap: 0;
  }
  .stat-header-name {
    flex: 1;
    min-width: 0;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .stat-header-col {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: right;
    width: 52px;
    flex-shrink: 0;
  }

  /* Player rows — tighter */
  .player-row {
    display: flex;
    align-items: center;
    padding: 7px 12px;
    gap: 0;
    background: #f5f5f5;
    border-top: 1px solid #e8e8e8;
  }
  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: #000;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.2px;
    line-height: 1.2;
  }
  .stat-cols {
    display: flex;
    gap: 0;
    flex-shrink: 0;
  }
  .stat-col {
    text-align: right;
    width: 52px;
    flex-shrink: 0;
  }
  .stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #111;
    line-height: 1.1;
  }
  .stat-lbl {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: #999;
    text-transform: uppercase;
  }

  /* ── CONFIRM BUTTON ── */
  .confirm-bar {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 398px;
    z-index: 99;
  }
  .confirm-btn {
    background: var(--accent);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 12px;
    padding: 15px;
    width: 100%;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 24px rgba(200,168,75,0.25);
  }
  .confirm-btn:active { transform: scale(0.97); }

  /* ── RESULTS SCREEN ── */
  .results-screen {
    padding: 24px 16px 40px;
    background: #ffffff;
    min-height: 100vh;
  }
  .results-record {
    text-align: center;
    margin-bottom: 8px;
  }
  .record-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
    color: #000;
  }
  .record-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #666;
    margin-top: 4px;
  }
  .grade-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 12px 0 20px;
  }
  .grade-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--accent-dim);
    line-height: 1;
  }
  .grade-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #555;
    text-transform: uppercase;
  }
  .score-chips { display: none; }
  .score-chip {
    padding: 8px 20px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid #e0e0e0;
  }
  .score-chip.offense { background: #eef4fc; }
  .score-chip.defense { background: #fceeed; }
  .chip-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-chip.offense .chip-label { color: #2a6bb5; }
  .score-chip.defense .chip-label { color: #b52a2a; }
  .chip-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #000;
  }

  /* Result rows */
  .result-row {
    background: #f5f5f5;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-left: 3px solid transparent;
  }
  .result-row.offense-row { border-left-color: var(--offense); }
  .result-row.defense-row { border-left-color: var(--defense); }

  .pos-avatar {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .pos-avatar.offense-pos { background: rgba(74,144,217,0.15); color: var(--offense); }
  .pos-avatar.defense-pos { background: rgba(217,74,74,0.15);  color: var(--defense); }

  .result-info { flex: 1; min-width: 0; }
  .result-school {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #000;
    letter-spacing: 0.3px;
  }
  .result-era {
    font-size: 11px;
    color: #666;
    margin-top: 1px;
    letter-spacing: 0.5px;
  }
  .result-players {
    font-size: 11px;
    color: #888;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-score-col { display: none; }

  .cta-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }
  .cta-btn {
    padding: 14px;
    border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cta-btn:active { transform: scale(0.97); }
  .cta-share { background: var(--accent); color: #000; }
  .cta-again { background: #f0f0f0; color: #000; border: 1px solid #ddd; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">POSITION<span> U</span></div>
  <div id="roundLabel" class="round-badge">Round 1 of 8</div>
  <div id="phaseBadge" class="phase-badge phase-offense">OFFENSE</div>
</div>

<!-- SPIN SCREEN -->
<div id="spinScreen" class="spin-screen">
  <div class="cards-row">
    <div id="teamCard" class="spin-card team-card">
      <div class="card-label">Team</div>
      <div id="teamValue" class="card-value">–</div>
    </div>
    <div id="eraCard" class="spin-card era-card">
      <div class="card-label">Era</div>
      <div id="eraValue" class="card-value">–</div>
    </div>
  </div>

  <div id="spinStatus" class="spin-status"></div>

  <button id="spinBtn" class="spin-btn">SPIN</button>

  <!-- Respins moved to room/selection screen -->
</div>

<!-- ROOM SCREEN -->
<div id="roomScreen" class="room-screen hidden">
  <div class="result-header">
    <div id="roomSchoolPill" class="result-pill school">MIA</div>
    <div id="roomEraPill" class="result-pill era">90s</div>
    <div style="flex:1"></div>
    <button id="respinTeamBtn" class="respin-btn used" onclick="doRespin('team')">
      <span class="respin-icon">↺</span> Team
    </button>
    <button id="respinEraBtn" class="respin-btn used" onclick="doRespin('era')">
      <span class="respin-icon">↺</span> Era
    </button>
  </div>
  <div class="pos-instruction">Tap a position room to select it</div>
  <div id="roomList"></div>
</div>

<!-- CONFIRM BAR -->
<div id="confirmBar" class="confirm-bar hidden">
  <button class="confirm-btn" onclick="confirmPick()">LOCK IN ROOM</button>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="results-screen hidden">
  <div class="results-record">
    <div id="finalRecord" class="record-num">–</div>
    <div class="record-label">Projected Record</div>
  </div>
  <div class="grade-row">
    <div id="gradeDisplay" class="grade-badge">–</div>
    <div id="gradeLabel" class="grade-label">–</div>
  </div>
  <div class="score-chips">
    <div class="score-chip offense">
      <div class="chip-label">OFF</div>
      <div id="offScore" class="chip-val">–</div>
    </div>
    <div class="score-chip defense">
      <div class="chip-label">DEF</div>
      <div id="defScore" class="chip-val">–</div>
    </div>
  </div>
  <div id="resultRows"></div>
  <div class="cta-row">
    <button class="cta-btn cta-share" onclick="alert('Share coming soon!')">Share</button>
    <button class="cta-btn cta-again" onclick="resetGame()">Play Again</button>
  </div>
</div>

<!-- DOCK -->
<div class="dock">
  <div class="dock-sections">
    <div class="dock-group" id="offenseDock"></div>
    <div class="dock-divider"></div>
    <div class="dock-group" id="defenseDock"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────────────
// GAME DATA — embedded rooms
// ──────────────────────────────────────────────────────────────

// ──────────────────────────────────────────────────────────────
// SCORING ENGINE (inline)
// ──────────────────────────────────────────────────────────────
const CAPS = { QB:115, RB:140, WR:120, TE:100, OL:135, DL:120, LB:120, DB:120 };
const SCALE = { QB:3.2, RB:3.0, WR:2.8, TE:2.2, OL:1.0, DL:5.5, LB:4.8, DB:5.0 };

function toPG(stats, games) {
  const g = games || 12, s = {};
  if (stats.passYds !== undefined)  s.passYdsPerGame  = stats.passYds  / g;
  if (stats.passTDs !== undefined)  s.passTDsPerGame  = stats.passTDs  / g;
  if (stats.intsSeason !== undefined) s.intsPerGame   = stats.intsSeason / g;
  if (stats.rushYds !== undefined)  s.rushYdsPerGame  = stats.rushYds  / g;
  if (stats.rushTDs !== undefined)  s.rushTDsPerGame  = stats.rushTDs  / g;
  if (stats.recYds  !== undefined)  s.recYdsPerGame   = stats.recYds   / g;
  if (stats.recTDs  !== undefined)  s.recTDsPerGame   = stats.recTDs   / g;
  if (stats.rec     !== undefined)  s.recPerGame      = stats.rec      / g;
  if (stats.yac     !== undefined)  s.yacPerGame      = stats.yac      / g;
  if (stats.sacks   !== undefined)  s.sacksPerGame    = stats.sacks    / g;
  if (stats.tfls    !== undefined)  s.tflsPerGame     = stats.tfls     / g;
  if (stats.hurries !== undefined)  s.hurriesPerGame  = stats.hurries  / g;
  if (stats.ff      !== undefined)  s.ffPerGame       = stats.ff       / g;
  if (stats.tackles !== undefined)  s.tacklesPerGame  = stats.tackles  / g;
  if (stats.ints    !== undefined)  s.intsPerGame     = stats.ints     / g;
  if (stats.pbus    !== undefined)  s.pbusPerGame     = stats.pbus     / g;
  ['ypc','qbr','sacksAllowedSeason','pancakeBlocksSeason','passBlockEff','runBlockEff','dominanceGrade','coverageGrade'].forEach(k => {
    if (stats[k] !== undefined) s[k] = stats[k];
  });
  return s;
}

function calcBonuses(b = {}) {
  let n = 0;
  if (b.heisman) n+=30; if (b.consensusAllAmerican) n+=15; if (b.firstTeamAllAmerican) n+=10;
  if (b.secondTeamAllAmerican) n+=5;
  if (b.biletnikoff||b.outland||b.butkus||b.mackey||b.doakWalker||b.nagurski) n+=15;
  if (b.bednarik) n+=20; if (b.lombardiAward||b.waltCamp||b.rimington) n+=12;
  if (b.otherNamedCollegeAward) n+=8;
  const pk = b.nflDraftPick||999;
  n += pk<=5?25:pk<=10?20:pk<=32?15:pk<=64?8:pk<=105?4:0;
  if (b.nationalChampionship) n+=20; if (b.conferenceChampionship) n+=8; if (b.majorBowlWin) n+=5;
  if (b.collegeDominance==='allTime') n+=22;
  else if (b.collegeDominance==='eraDef') n+=12;
  else if (b.collegeDominance==='elite') n+=8;
  else if (b.collegeDominance==='veryGood') n+=4;
  return n;
}

function scoreOne(player, pos) {
  const s = toPG(player.stats, player.games);
  let base = 0;
  if (pos==='QB') {
    const pg = (s.passYdsPerGame||0)*0.04+(s.passTDsPerGame||0)*4+(s.intsPerGame||0)*-2
             +((s.qbr||60)>=80?5:(s.qbr||60)>=60?3:1)+(s.rushYdsPerGame||0)*0.06+(s.rushTDsPerGame||0)*6;
    base = (pg*12)/SCALE.QB;
  } else if (pos==='RB') {
    const ypcB=(s.ypc||0)>=6?5:(s.ypc||0)>=5?3:(s.ypc||0)>=4?1:0;
    const pg=(s.rushYdsPerGame||0)*0.1+(s.rushTDsPerGame||0)*6+ypcB+(s.recPerGame||0)*0.5+(s.recYdsPerGame||0)*0.1+(s.recTDsPerGame||0)*6;
    base=(pg*12)/SCALE.RB;
  } else if (pos==='WR') {
    const yacPR=(s.recPerGame||0)>0?(s.yacPerGame||0)/(s.recPerGame||1):0;
    const yacB=yacPR>=5?3:yacPR>=3?1:0;
    const pg=(s.recPerGame||0)*0.5+(s.recYdsPerGame||0)*0.1+(s.recTDsPerGame||0)*6+yacB+(s.rushYdsPerGame||0)*0.1+(s.rushTDsPerGame||0)*6;
    base=(pg*12)/SCALE.WR;
  } else if (pos==='TE') {
    const yacPR=(s.recPerGame||0)>0?(s.yacPerGame||0)/(s.recPerGame||1):0;
    const yacB=yacPR>=5?3:yacPR>=3?1:0;
    const pg=(s.recPerGame||0)*0.5+(s.recYdsPerGame||0)*0.1+(s.recTDsPerGame||0)*6+yacB;
    base=(pg*12)/SCALE.TE;
  } else if (pos==='OL') {
    base=100-(s.sacksAllowedSeason||30)*3+Math.min((s.pancakeBlocksSeason||0)*0.5,60)+((s.passBlockEff||88)>=94?10:(s.passBlockEff||88)>=90?5:-5)+((s.runBlockEff||55)>=65?10:(s.runBlockEff||55)>=55?5:-5);
  } else if (pos==='DL') {
    const gB=s.dominanceGrade==='A+'?15:s.dominanceGrade==='A'?10:5;
    const pg=(s.sacksPerGame||0)*6+(s.tflsPerGame||0)*3+(s.hurriesPerGame||0)*1+(s.ffPerGame||0)*4+gB;
    base=(pg*12)/SCALE.DL;
  } else if (pos==='LB') {
    const pg=(s.tacklesPerGame||0)*1+(s.sacksPerGame||0)*4+(s.intsPerGame||0)*6+(s.tflsPerGame||0)*2;
    base=(pg*12)/SCALE.LB;
  } else if (pos==='DB') {
    const gB=s.coverageGrade==='A+'?15:s.coverageGrade==='A'?10:5;
    const pg=(s.intsPerGame||0)*6+(s.pbusPerGame||0)*2+(s.tacklesPerGame||0)*1+(s.ffPerGame||0)*4+gB;
    base=(pg*12)/SCALE.DB;
  }
  return Math.min(base + calcBonuses(player.bonuses), CAPS[pos]);
}

function scoreRoom(room) {
  const scores = room.players.map(p => ({ name:p.name, score:Math.round(scoreOne(p, room.pos)) }));
  scores.sort((a,b) => b.score-a.score);
  const top3 = scores.slice(0,3);
  const roomScore = Math.round(top3.reduce((s,p) => s+p.score, 0) / top3.length);
  return { roomScore, playerScores: scores, top3 };
}

    {min:650,record:'11-4',grade:'A-',label:'Top 10 Caliber'},
    {min:600,record:'10-5',grade:'B+',label:'Bowl Winner'},
    {min:550,record:'9-6', grade:'B', label:'Solid Program'},
    {min:500,record:'8-7', grade:'B-',label:'Bowl Eligible'},
    {min:450,record:'7-8', grade:'C+',label:'Rebuilding'},
    {min:400,record:'6-9', grade:'C', label:'Tough Season'},
    {min:350,record:'5-10',grade:'C-',label:'Rough Year'},
    {min:0,  record:'4-11',grade:'D', label:'Reset the Program'},
  ];
  return t.find(x=>total>=x.min)||t[t.length-1];
}

// ──────────────────────────────────────────────────────────────
// GAME STATE
// ──────────────────────────────────────────────────────────────
const OFFENSE_SLOTS = ['QB','RB','WR','TE','OL'];
const DEFENSE_SLOTS = ['DL','LB','DB'];
const ALL_SLOTS = [...OFFENSE_SLOTS, ...DEFENSE_SLOTS];

let state = {
  round: 0,
  respinTeamUsed: false,
  respinEraUsed: false,
  currentSchoolEra: null,
  selectedPos: null,
  picks: {},       // { QB: { room, roomScore, playerScores }, ... }
  phase: 'spin',   // 'spin' | 'room' | 'results'
};

const SPIN_POOL = Object.keys(GAME_DATA);

function currentPos() {
  return ALL_SLOTS[state.round] || null;
}

function getRemainingSlots() {
  return ALL_SLOTS.filter(s => !state.picks[s]);
}

// ──────────────────────────────────────────────────────────────
// INIT & RENDER
// ──────────────────────────────────────────────────────────────
function init() {
  state = {
    round: 0, respinTeamUsed: false, respinEraUsed: false,
    currentSchoolEra: null, selectedPos: null, picks: {}, phase: 'spin',
  };
  renderDock();
  showSpinScreen();
  updateHeader();
}

function updateHeader() {
  const pos = currentPos();
  const filled = Object.keys(state.picks).length;
  document.getElementById('roundLabel').textContent = `Round ${filled + 1} of 8`;
  const badge = document.getElementById('phaseBadge');
  if (pos && OFFENSE_SLOTS.includes(pos)) {
    badge.textContent = 'OFFENSE'; badge.className = 'phase-badge phase-offense';
  } else {
    badge.textContent = 'DEFENSE'; badge.className = 'phase-badge phase-defense';
  }
}

function renderDock() {
  const off = document.getElementById('offenseDock');
  const def = document.getElementById('defenseDock');
  off.innerHTML = '';
  def.innerHTML = '';

  OFFENSE_SLOTS.forEach(pos => {
    const pick = state.picks[pos];
    const slot = document.createElement('div');
    slot.className = 'dock-slot';
    const circle = document.createElement('div');
    circle.className = 'dock-circle' + (pick ? ' offense-filled' : '');
    circle.textContent = pick ? pick.room.school.substring(0,3).toUpperCase() : pos;
    const label = document.createElement('div');
    label.className = 'dock-label' + (pick ? ' filled-label' : '');
    label.textContent = pos;
    slot.appendChild(circle); slot.appendChild(label);
    off.appendChild(slot);
  });

  DEFENSE_SLOTS.forEach(pos => {
    const pick = state.picks[pos];
    const slot = document.createElement('div');
    slot.className = 'dock-slot';
    const circle = document.createElement('div');
    circle.className = 'dock-circle' + (pick ? ' defense-filled' : '');
    circle.textContent = pick ? pick.room.school.substring(0,3).toUpperCase() : pos;
    const label = document.createElement('div');
    label.className = 'dock-label' + (pick ? ' filled-label' : '');
    label.textContent = pos;
    slot.appendChild(circle); slot.appendChild(label);
    def.appendChild(slot);
  });
}

// ──────────────────────────────────────────────────────────────
// SPIN LOGIC
// ──────────────────────────────────────────────────────────────
let spinInterval = null;
const SCHOOL_ABBREVS = {
  'Alabama':        'ALA',
  'Arkansas':       'ARK',
  'Auburn':         'AUB',
  'Baylor':         'BAY',
  'Clemson':        'CLEM',
  'Colorado':       'COLO',
  'Florida':        'UF',
  'Florida State':  'FSU',
  'Georgia':        'UGA',
  'Georgia Tech':   'GT',
  'Iowa':           'IOWA',
  'Kansas State':   'KSU',
  'LSU':            'LSU',
  'Miami':          'UM',
  'Michigan':       'MICH',
  'Michigan State': 'MSU',
  'Nebraska':       'NEB',
  'Notre Dame':     'ND',
  'Ohio State':     'OSU',
  'Oklahoma':       'OU',
  'Oklahoma State': 'OKST',
  'Ole Miss':       'MISS',
  'Oregon':         'ORE',
  'Penn State':     'PSU',

  'South Carolina': 'SC',
  'Stanford':       'STAN',

  'TCU':            'TCU',

  'Texas':          'TEX',
  'Texas A&M':      'TAMU',
  'Texas Tech':     'TTU',
  'UCLA':           'UCLA',
  'USC':            'USC',
  'Utah':           'UTAH',
  'Virginia Tech':  'VT',
  'Washington':     'WASH',
  'West Virginia':  'WVU',
  'Wisconsin':      'WISC',
};

function abbrev(school) {
  return SCHOOL_ABBREVS[school] || school.substring(0,3).toUpperCase();
}

function randomKey() {
  return SPIN_POOL[Math.floor(Math.random() * SPIN_POOL.length)];
}

function parseKey(key) {
  const parts = key.split(' ');
  const era = parts[parts.length - 1];
  const school = parts.slice(0, -1).join(' ');
  return { school, era };
}

function showSpinScreen() {
  document.getElementById('spinScreen').classList.remove('hidden');
  document.getElementById('roomScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('confirmBar').classList.add('hidden');

  // Reset cards
  document.getElementById('teamCard').className = 'spin-card team-card';
  document.getElementById('eraCard').className = 'spin-card era-card';
  document.getElementById('teamValue').textContent = '–';
  document.getElementById('eraValue').textContent = '–';
  document.getElementById('spinStatus').textContent = '';

  // Always reset spin button to its default action
  const btn = document.getElementById('spinBtn');
  btn.disabled = false;
  btn.textContent = 'SPIN';
  btn.onclick = doSpin;

  state.currentSchoolEra = null;
  state.phase = 'spin';
}

function updateRespinBtns() {
  const teamBtn = document.getElementById('respinTeamBtn');
  const eraBtn  = document.getElementById('respinEraBtn');

  if (state.respinTeamUsed) {
    teamBtn.className = 'respin-btn used';
    teamBtn.disabled = true;
  } else {
    teamBtn.className = 'respin-btn available';
    teamBtn.disabled = false;
  }

  if (state.respinEraUsed) {
    eraBtn.className = 'respin-btn used';
    eraBtn.disabled = true;
  } else {
    eraBtn.className = 'respin-btn available';
    eraBtn.disabled = false;
  }
}

function doSpin() {
  // Guard against firing during animation or after result lands
  if (state.phase !== 'spin') return;
  if (state.currentSchoolEra) return;

  document.getElementById('spinBtn').disabled = true;
  document.getElementById('spinStatus').textContent = 'SPINNING...';

  const teamCard = document.getElementById('teamCard');
  const eraCard  = document.getElementById('eraCard');
  teamCard.classList.add('spinning');
  eraCard.classList.add('spinning');

  let ticks = 0;
  const maxTicks = 18;
  let finalKey = randomKey();

  spinInterval = setInterval(() => {
    const k = randomKey();
    const { school, era } = parseKey(k);
    document.getElementById('teamValue').textContent = abbrev(school);
    document.getElementById('eraValue').textContent  = era;
    ticks++;

    if (ticks >= maxTicks) {
      clearInterval(spinInterval);
      teamCard.classList.remove('spinning');
      eraCard.classList.remove('spinning');

      // Make sure final key has data
      while (!GAME_DATA[finalKey]) finalKey = randomKey();
      const f = parseKey(finalKey);
      document.getElementById('teamValue').textContent = abbrev(f.school);
      document.getElementById('eraValue').textContent  = f.era;

      state.currentSchoolEra = finalKey;
      document.getElementById('spinStatus').textContent = '';
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('spinBtn').textContent = 'SPIN';
      // Auto-navigate after 2 seconds
      setTimeout(() => {
        if (state.phase === 'spin' && state.currentSchoolEra) goToRoom();
      }, 2000);
    }
  }, 80);
}

function doRespin(which) {
  if (!state.currentSchoolEra) return;
  const { school: curSchool, era: curEra } = parseKey(state.currentSchoolEra);
  const curKey = state.currentSchoolEra;

  // Mark used immediately
  if (which === 'team') state.respinTeamUsed = true;
  else state.respinEraUsed = true;

  // Go back to spin screen, showing the locked card with its current value
  showSpinScreen();

  if (which === 'team') {
    document.getElementById('eraCard').className = 'spin-card locked';
    document.getElementById('eraValue').textContent = curEra;
    document.getElementById('teamCard').className = 'spin-card team-card spinning';
    document.getElementById('teamValue').textContent = abbrev(curSchool);
    document.getElementById('spinStatus').textContent = 'RESPINNING TEAM...';
    document.getElementById('spinBtn').disabled = true;
    updateRespinBtns();

    let ticks = 0;
    spinInterval = setInterval(() => {
      document.getElementById('teamValue').textContent = abbrev(parseKey(randomKey()).school);
      ticks++;
      if (ticks >= 18) {
        clearInterval(spinInterval);
        // Pool: same era, different school/key — guaranteed different
        const pool = SPIN_POOL.filter(k => parseKey(k).era === curEra && k !== curKey && GAME_DATA[k]);
        const newKey = pool.length
          ? pool[Math.floor(Math.random() * pool.length)]
          : SPIN_POOL.filter(k => k !== curKey && GAME_DATA[k])[Math.floor(Math.random() * (SPIN_POOL.length - 1))];
        const f = parseKey(newKey);
        document.getElementById('teamCard').className = 'spin-card team-card';
        document.getElementById('teamValue').textContent = abbrev(f.school);
        state.currentSchoolEra = newKey;
        state.phase = 'spin';
        document.getElementById('spinStatus').textContent = '';
        setTimeout(() => { if (state.currentSchoolEra) goToRoom(); }, 1800);
      }
    }, 70);

  } else {
    document.getElementById('teamCard').className = 'spin-card locked';
    document.getElementById('teamValue').textContent = abbrev(curSchool);
    document.getElementById('eraCard').className = 'spin-card era-card spinning';
    document.getElementById('eraValue').textContent = curEra;
    document.getElementById('spinStatus').textContent = 'RESPINNING ERA...';
    document.getElementById('spinBtn').disabled = true;
    updateRespinBtns();

    let ticks = 0;
    spinInterval = setInterval(() => {
      document.getElementById('eraValue').textContent = parseKey(randomKey()).era;
      ticks++;
      if (ticks >= 18) {
        clearInterval(spinInterval);
        // Pool: same school, different era/key — guaranteed different
        const pool = SPIN_POOL.filter(k => parseKey(k).school === curSchool && k !== curKey && GAME_DATA[k]);
        const newKey = pool.length
          ? pool[Math.floor(Math.random() * pool.length)]
          : SPIN_POOL.filter(k => k !== curKey && GAME_DATA[k])[Math.floor(Math.random() * (SPIN_POOL.length - 1))];
        const f = parseKey(newKey);
        document.getElementById('eraCard').className = 'spin-card era-card';
        document.getElementById('eraValue').textContent = f.era;
        state.currentSchoolEra = newKey;
        state.phase = 'spin';
        document.getElementById('spinStatus').textContent = '';
        setTimeout(() => { if (state.currentSchoolEra) goToRoom(); }, 1800);
      }
    }, 70);
  }
}

// ──────────────────────────────────────────────────────────────
// ROOM SCREEN
// ──────────────────────────────────────────────────────────────
function goToRoom() {
  if (!state.currentSchoolEra) return;
  const key = state.currentSchoolEra;
  const { school, era } = parseKey(key);
  const data = GAME_DATA[key];

  document.getElementById('spinScreen').classList.add('hidden');
  document.getElementById('roomScreen').classList.remove('hidden');
  document.getElementById('confirmBar').classList.remove('hidden');
  state.phase = 'room';

  document.getElementById('roomSchoolPill').textContent = school;
  document.getElementById('roomEraPill').textContent = era;
  updateRespinBtns();

  // Determine which phase slots to show
  const pos = currentPos();
  const currentPhaseSlots = pos && OFFENSE_SLOTS.includes(pos) ? OFFENSE_SLOTS : DEFENSE_SLOTS;
  const remaining = getRemainingSlots();
  const available = currentPhaseSlots.filter(p => !state.picks[p] && data[p]);
  const alreadyFilled = currentPhaseSlots.filter(p => state.picks[p]);

  // Auto-select first available
  state.selectedPos = available[0] || null;
  updateConfirmBtn();

  // Render all cards
  renderAllCards(data, available, alreadyFilled);
}

function renderAllCards(data, available, alreadyFilled) {
  const allPositions = [...available, ...alreadyFilled];
  let html = '';

  allPositions.forEach(pos => {
    const room = data[pos];
    if (!room) return;
    const isFilled = !!state.picks[pos];
    const isSelected = state.selectedPos === pos;
    const stats = DISPLAY_STATS[pos] || [];

    html += `<div class="pos-card${isSelected ? ' selected' : ''}${isFilled ? ' filled-card' : ''}"
      id="poscard-${pos}"
      onclick="${isFilled ? '' : `selectCard('${pos}')`}">`;

    // Card header
    html += `<div class="pos-card-header">
      <div class="pos-card-title">${pos}</div>
      <div class="pos-card-check">${isSelected ? '✓' : ''}</div>
    </div>`;

    // Stat column headers
    if (stats.length) {
      html += `<div class="stat-header-row">
        <div class="stat-header-name">Player</div>`;
      stats.forEach(s => {
        html += `<div class="stat-header-col">${s.label}</div>`;
      });
      html += `</div>`;
    }

    // Player rows
    room.players.forEach(player => {
      html += `<div class="player-row">
        <div class="player-info">
          <div class="player-name">${player.name}</div>
        </div>
        <div class="stat-cols">`;
      stats.forEach(s => {
        const raw = player.stats[s.key];
        const val = raw !== undefined ? s.fmt(raw) : '—';
        html += `<div class="stat-col">
          <div class="stat-val">${val}</div>
        </div>`;
      });
      html += `</div></div>`;
    });

    html += `</div>`; // end pos-card
  });

  document.getElementById('roomList').innerHTML = html;
}

function selectCard(pos) {
  state.selectedPos = pos;
  updateConfirmBtn();

  // Update card selection state
  document.querySelectorAll('.pos-card').forEach(card => {
    const cardPos = card.id.replace('poscard-', '');
    card.classList.toggle('selected', cardPos === pos);
    const check = card.querySelector('.pos-card-check');
    const title = card.querySelector('.pos-card-title');
    if (check) check.textContent = cardPos === pos ? '✓' : '';
  });
}

function updateConfirmBtn() {
  const btn = document.querySelector('.confirm-btn');
  if (btn && state.selectedPos) {
    btn.innerHTML = `LOCK IN ${state.selectedPos} ROOM`;
  }
}

// ──────────────────────────────────────────────────────────────
// CONFIRM PICK
// ──────────────────────────────────────────────────────────────
function confirmPick() {
  const pos = state.selectedPos;
  if (!pos || !state.currentSchoolEra) return;

  const key = state.currentSchoolEra;
  const data = GAME_DATA[key];
  const room = data[pos];
  if (!room) return;

  const scored = scoreRoom(room);
  state.picks[pos] = { room, roomScore: scored.roomScore, playerScores: scored.playerScores };
  state.round++;
  state.currentSchoolEra = null;
  state.selectedPos = null;

  renderDock();
  updateHeader();

  if (Object.keys(state.picks).length === 8) {
    showResults();
  } else {
    showSpinScreen();
  }
}

// ──────────────────────────────────────────────────────────────
// RESULTS
// ──────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById('spinScreen').classList.add('hidden');
  document.getElementById('roomScreen').classList.add('hidden');
  document.getElementById('confirmBar').classList.add('hidden');
  document.getElementById('resultsScreen').classList.remove('hidden');
  document.querySelector('.dock').style.display = 'none';

  let total = 0, offTotal = 0, defTotal = 0;
  OFFENSE_SLOTS.forEach(pos => {
    const s = state.picks[pos]?.roomScore || 0;
    offTotal += s; total += s;
  });
  DEFENSE_SLOTS.forEach(pos => {
    const s = state.picks[pos]?.roomScore || 0;
    defTotal += s; total += s;
  });

  const result = mapScore(total);
  document.getElementById('finalRecord').textContent = result.record;
  document.getElementById('gradeDisplay').textContent = result.grade;
  document.getElementById('gradeLabel').textContent = result.label;
  document.getElementById('offScore').textContent = offTotal;
  document.getElementById('defScore').textContent = defTotal;

  let rowsHtml = '';
  ALL_SLOTS.forEach(pos => {
    const pick = state.picks[pos];
    if (!pick) return;
    const isOff = OFFENSE_SLOTS.includes(pos);
    const topNames = pick.playerScores.slice(0,3).map(p => p.name.split(' ').pop()).join(' · ');
    rowsHtml += `
      <div class="result-row ${isOff ? 'offense-row' : 'defense-row'}">
        <div class="pos-avatar ${isOff ? 'offense-pos' : 'defense-pos'}">${pos}</div>
        <div class="result-info">
          <div class="result-school">${pick.room.school}</div>
          <div class="result-era">${pick.room.era}</div>
          <div class="result-players">${topNames}</div>
        </div>
        <div class="result-score-col">
          <div class="result-score">${pick.roomScore}</div>
        </div>
      </div>`;
  });

  document.getElementById('resultRows').innerHTML = rowsHtml;
}

function resetGame() {
  document.querySelector('.dock').style.display = '';
  document.getElementById('resultsScreen').classList.add('hidden');
  init();
}

// Start
window.addEventListener('DOMContentLoaded', init);
</script>
