<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YQTNJ08SB5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-YQTNJ08SB5');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<!-- Stop iOS Safari data detectors from auto-linking school/place names (e.g. "Clemson") into Maps links -->
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Position U</title>
<link rel="stylesheet" href="css/game.css?v=20260612f">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-stripe"></div>
  <div class="header-inner-row">
    <div class="logo">POSITION<span>U</span></div>
    <div id="roundLabel" class="round-badge">Round 1 of 8</div>
  </div>
</div>

<!-- SPIN SCREEN -->
<div id="spinScreen" class="spin-screen">
  <div id="spinIntro" class="spin-intro">
    <div class="spin-intro-line1">8 position rooms.<br>6 decades.</div>
    <div class="spin-intro-line2">Can you build a college football squad that goes 15-0?</div>
  </div>
  <div class="cards-row">
    <div id="teamCard" class="spin-card team-card">
      <div class="card-label">Team</div>
      <div id="teamValue" class="card-value">–</div>
    </div>
    <div id="eraCard" class="spin-card era-card">
      <div class="card-label">Era</div>
      <div id="eraValue" class="card-value">–</div>
    </div>
  </div>

  <div id="spinStatus" class="spin-status"></div>

  <button id="spinBtn" class="spin-btn">SPIN</button>

  <!-- Respins moved to room/selection screen -->
</div>

<!-- ROOM SCREEN -->
<div id="roomScreen" class="room-screen hidden">
  <div class="result-header">
    <div id="roomSchoolPill" class="result-pill school">MIA</div>
    <div id="roomEraPill" class="result-pill era">90s</div>
    <div style="flex:1"></div>
    <button id="respinBtn" class="respin-btn used" onclick="doRespin()">
      <span class="respin-icon">↺</span><span class="respin-label">Respin (2)</span>
    </button>
  </div>
  <div class="pos-instruction">Tap a room, then tap its glowing slot below to lock it in</div>
  <div id="roomList" class="pos-list" style="padding:8px 16px;"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="results-screen hidden">

  <div class="results-header-row">
    <div class="results-record-col">
      <div id="finalRecord" class="record-num">–</div>
      <div id="playoffStatus" class="playoff-status"></div>
    </div>
    <div class="ratings-stack">
      <div class="rating-line offense">
        <span class="rating-label">OFF</span>
        <span id="offScore" class="rating-val">–</span>
      </div>
      <div class="rating-line defense">
        <span class="rating-label">DEF</span>
        <span id="defScore" class="rating-val">–</span>
      </div>
    </div>
  </div>
  <div id="resultRows" style="padding:10px 16px;display:flex;flex-direction:column;gap:5px;"></div>
  <div id="playoffCta" class="playoff-cta-row">
    <button class="cta-btn cta-playoffs" onclick="startPlayoffs()">Enter the Playoffs →</button>
  </div>
  <div class="cta-row">
    <button id="tryAgainBtn" class="cta-btn cta-share" onclick="resetGame()"><span class="cta-ico">↺</span>Try Again</button>
  </div>
</div>

<!-- PLAYOFF SCREEN -->
<div id="playoffScreen" class="playoff-screen hidden"></div>

<!-- DOCK -->
<div class="dock" id="persistentDock">
  <div class="dock-sections">
    <div class="dock-group" id="offenseDock"></div>
    <div class="dock-divider"></div>
    <div class="dock-group" id="defenseDock"></div>
  </div>
</div>


<script src="js/rules.js?v=20260612f"></script>
<script src="js/scoring.js?v=20260612f"></script>
<script src="js/playoffs.js?v=20260612f"></script>
<script src="js/data-loader.js?v=20260612f"></script>
<script src="js/game.js?v=20260612f"></script>
</body>
</html>
